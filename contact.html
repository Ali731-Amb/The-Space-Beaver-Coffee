<!DOCTYPE html>
<html>

<head>
    <title>The Root Dam</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
			<div class="brand">
				<img src="assets/Castor_img.1.png.png" alt="logo" width="50">
				<span> The Root Dam</span>
			</div>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="equipage.html">L'Équipage</a></li>
                <li><a href="contact.html">On est là !</a></li>
            </ul>
			<div class="search-box">
				<input type="text" placeholder="Entrez le code secret..."></input>
				<button type="button">🔍</button>

			</div>
        </nav>
    </header>

    <main>
        <section class="contact-container">
			<form>
				<div class="form-group">
					<label for="nom">Nom :</label>
					<input type="text" id="nom" name="user_nom" placeholder="Votre nom de castor" required>
				</div>
				<div class="form-group">
					<label for="email">Email :</label>
					<input type="email" id="email" name="user_email" placeholder="Nom@barrage.space" required>
				</div>
				<div class="form-group">
					<label for="sujet">Sujet :</label>
					<input type="text" id="sujet" name="user_message" required>
				</div>
				<div class="form-group">
					<label for="message">Message : </label>
					<textarea id="message" name="user_message" placeholder="Dites nous tous..."  required></textarea>
				</div>
				<div class="form-group">
					<button type="submit">Envoyer le signal</button>
				</div>
			</form>
				<div class="contact-info">
					<h3> Contactez-nous !</h3>
					<ul>
						<li>InstaCastor</li>
						<li>GitHub du Barrage</li>
						<li>X-Castor</li>
					</ul>
				</div>
		</section>

    </main>

    <footer>
        <p>© 2026 The Root Dam - Compiled with Beaver 3.0 🦫</p>
    </footer>

</body>
</html>
